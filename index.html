<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>@ry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        setLogLevel('Debug');

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        window.fb = {};

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            window.fb.db = getFirestore(app);
            window.fb.auth = getAuth(app);
            window.fb.appId = appId;
        }

        window.initializeAuth = async function() {
            if (!window.fb.auth) {
                console.error("Firebase Auth is not initialized.");
                return;
            }
            try {
                const auth = window.fb.auth;
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                window.fb.userId = auth.currentUser?.uid || crypto.randomUUID();
            } catch (error) {
                console.error("Error setting up Firebase Auth:", error);
            }
        }
    </script>

    <style>
        body {
            background-color: #fdf2f8; /* Soft pink background */
            background-image: radial-gradient(circle at 50% 0%, #fff0f5 0%, #fce7f3 100%);
            color: #4a4a4a;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }
        #intro-video-blurred {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: blur(15px);
            opacity: 0.15; /* Lightened video opacity */
            transition: none;
        }
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .rain-drop {
            position: absolute;
            width: 1px;
            height: 15px;
            background: rgba(255, 105, 180, 0.3); /* Pink rain */
            opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100%) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(100vh) translateX(100px); opacity: 0; }
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
            transition: all 0.3s ease;
        }
        #username-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.25rem;
            line-height: 1.5rem;
            margin-bottom: 0.5rem;
            color: #db2777; /* Rose pink text */
            text-transform: lowercase;
        }
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fdf2f8;
            color: #db2777;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 999;
            transition: opacity 1s ease;
        }
        #splash-screen h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            line-height: 1.5rem;
        }
        .heart-particle {
            position: fixed;
            font-size: 1.25rem;
            color: #fb7185;
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            z-index: 1000;
            animation: heart-burst 1.2s ease-out forwards;
        }
        @keyframes heart-burst {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0.7; }
            50% { transform: translate(calc(-50% + var(--drift-x)), calc(-50% + var(--drift-y))) scale(1); opacity: 0.4; }
            100% { transform: translate(calc(-50% + var(--drift-x) * 2), calc(-200% + var(--drift-y) * 2)) scale(0.5); opacity: 0; }
        }
        /* The Squircle Floating Card */
        .main-card-glass {
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem; /* Squircle effect */
            box-shadow: 0 20px 50px rgba(219, 39, 119, 0.08); /* Soft pink shadow */
            position: relative;
        }
        .cute-bow {
            position: absolute;
            top: -20px;
            right: -25px;
            transform: rotate(15deg);
            z-index: 20;
            filter: drop-shadow(0 4px 6px rgba(219, 39, 119, 0.2));
        }
        #main-content {
            transition: transform 0.3s ease-out, opacity 1s;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(0) rotateY(0);
            max-height: 100vh;
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #main-content::-webkit-scrollbar {
            display: none;
        }
        .link-card {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(252, 231, 243, 1);
            transition: all 0.3s ease-in-out;
            border-radius: 1.5rem;
        }
        .link-card:hover {
            background-color: #fff;
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.1);
            border-color: #fbcfe8;
        }
        /* High-contrast CTA button style */
        .btn-cta {
            background-color: #e11d48; /* Vibrant rose pink */
            color: white !important;
            box-shadow: 0 4px 14px rgba(225, 29, 72, 0.4);
            transition: all 0.3s ease;
        }
        .btn-cta:hover {
            background-color: #be123c;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(225, 29, 72, 0.5);
        }
        .status-dot {
            box-shadow: 0 0 8px #4ade80;
        }
    </style>
</head>
<body class="lowercase">
    <div id="cursor-dot"></div>
    <video class="w-full duration-1000 transition-opacity absolute h-full inset-0 object-cover z-0" id="intro-video-blurred" loop playsinline src="glaivie.mp4"></video>
    <div class="rain" id="rain-container"></div>
    
    <div id="splash-screen">
        <h1 class="glow-text font-extrabold sm:text-6xl text-4xl tracking-widest lowercase">wroof :3</h1>
    </div>

    <main class="flex items-center w-full duration-1000 h-screen hidden justify-center opacity-0 relative z-10" id="main-content">
        <div class="w-full main-card-glass max-w-lg mx-4 p-10 sm:p-14 rounded-[2.5rem]">
            <div class="cute-bow">
                <img alt="Cute Bow" src="https://cdn.discordapp.com/emojis/1403506840934944989.gif" height="60" width="60">
            </div>
            
            <header class="mb-10 text-center">
                <div class="flex items-center justify-center bg-white border-4 border-pink-100 shadow-sm h-32 mb-6 mx-auto overflow-hidden p-1 rounded-full w-32" id="profile-picture">
                    <svg class="w-full h-full p-2 text-pink-300" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="48" fill="#fff" stroke="#fbcfe8" stroke-width="2" />
                        <path d="M 50 20 C 65 20, 70 35, 65 45 C 60 55, 40 55, 35 45 C 30 35, 35 20, 50 20 Z M 20 85 A 30 30 0 0 1 80 85 L 80 100 L 20 100 Z" fill="#fbcfe8" />
                    </svg>
                </div>
                <h1 class="mb-2" id="username-title"></h1>
                <p class="text-pink-400 text-xs font-semibold tracking-widest uppercase" id="discord-status">loading status...</p>
                <div class="rounded-2xl bg-white border border-pink-100 text-pink-500 shadow-sm font-mono hidden max-w-xs mt-4 mx-auto p-3 text-center text-xs" id="discord-activity"></div>
            </header>

            <div class="w-12 h-1 bg-pink-200 mx-auto rounded-full mb-8"></div>
            
            <section class="mb-10 text-center">
                <p class="text-gray-500 text-sm font-light leading-relaxed whitespace-pre-wrap">dumb mutt</p>
            </section>
            
            <section class="select-none space-y-4">
                <a class="flex items-center flex-col justify-between link-card p-4 sm:flex-row group" href="#" id="discord-server-link" target="_blank">
                    <div class="flex items-center w-full" id="server-info">
                        <img alt="Server Icon" src="https://placehold.co/40x40/FFB6C1/ffffff?text=DC" class="rounded-full bg-pink-100 h-12 w-12 mr-4" id="server-icon" onerror='this.onerror=null,this.src="https://placehold.co/40x40/FFB6C1/ffffff?text=DC"'>
                        <div>
                            <span class="font-semibold text-gray-800" id="server-name">loading server...</span>
                            <div class="flex mt-1 space-x-3 text-gray-400 text-xs font-medium">
                                <span class="flex items-center">
                                    <span class="w-2 h-2 rounded-full bg-green-400 status-dot mr-1.5 inline-block"></span> 
                                    online: <span class="text-green-500 ml-1" id="online-members">0</span> 
                                </span>
                                <span class="flex items-center">
                                    <span class="w-2 h-2 rounded-full bg-gray-300 mr-1.5 inline-block"></span> 
                                    total: <span class="ml-1" id="total-members">0</span>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="font-bold btn-cta mt-4 px-5 py-2 rounded-full sm:ml-4 sm:mt-0 text-xs tracking-wide">
                        join
                    </div>
                </a>

                <a class="flex items-center flex-col justify-between link-card p-4 sm:flex-row group" href="https://www.roblox.com/users/488181/profile" id="roblox-profile-link" target="_blank">
                    <div class="flex items-center w-full">
                        <img alt="Roblox Avatar" src="https://placehold.co/40x40/FFB6C1/ffffff?text=R" class="rounded-full bg-pink-100 h-12 w-12 mr-4 object-cover" id="roblox-avatar" onerror='this.onerror=null,this.src="https://placehold.co/40x40/FFB6C1/ffffff?text=R+Err"'>
                        <div>
                            <span class="font-semibold text-gray-800" id="roblox-username">ChickenFingers</span>
                        </div>
                    </div>
                    <div class="font-bold btn-cta mt-4 px-5 py-2 rounded-full sm:ml-4 sm:mt-0 text-xs tracking-wide">
                        view
                    </div>
                </a>
            </section>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const DISCORD_USER_ID = '1459567571069177857';
        const DISCORD_INVITE_CODE = 'adoptme';
        const ROBLOX_USER_ID = '488181';    

        // --- Typewriter Effect Logic ---
        const DISPLAY_SEQUENCE = ['@', '@r', '@ry', '@r', '@', '@r', '@ry', '@r'];
        const TYPING_SPEED = 100;
        const DELETING_SPEED = 50;
        const PAUSE_TIME = 750;

        let sequenceIndex = 0;
        let charIndex = 0;
        let h1Element;
        let titleElement;

        function typeWriterLoop() {
            if (!h1Element) h1Element = document.getElementById('username-title');
            if (!titleElement) titleElement = document.getElementsByTagName('title')[0];

            const targetText = DISPLAY_SEQUENCE[sequenceIndex];
            const isTyping = targetText.length > charIndex;
            const isPausing = targetText.length === charIndex;
            const isDeleting = targetText.length < charIndex;
            let currentDelay = isTyping ? TYPING_SPEED : DELETING_SPEED;

            if (isPausing) {
                let delay = PAUSE_TIME; 
                if (targetText === '') delay = PAUSE_TIME * 1.5;
                sequenceIndex = (sequenceIndex + 1) % DISPLAY_SEQUENCE.length;
                setTimeout(typeWriterLoop, delay);
                return;
            }

            if (isTyping) charIndex++;
            else if (isDeleting) charIndex--;

            const currentDisplay = targetText.substring(0, charIndex);
            
            if (h1Element) h1Element.textContent = currentDisplay || '\u00A0';
            titleElement.textContent = currentDisplay;

            setTimeout(typeWriterLoop, currentDelay);
        }

        // --- Lanyard API Fetch ---
        function updateDiscordPresence(data) {
            const statusEl = document.getElementById('discord-status');
            const activityEl = document.getElementById('discord-activity');
            const pfpContainer = document.getElementById('profile-picture');
                
            if (!data || data.error) {
                statusEl.textContent = 'discord data unavailable';
                activityEl.classList.add('hidden');
                return;
            }

            const { discord_status, activities, discord_user } = data.data;

            let statusText = 'offline';
            let statusColor = 'text-gray-400';

            switch (discord_status) {
                case 'online':
                    statusText = 'online';
                    statusColor = 'text-green-500'; 
                    break;
                case 'idle':
                    statusText = 'idle';
                    statusColor = 'text-amber-500';  
                    break;
                case 'dnd':
                    statusText = 'do not disturb';
                    statusColor = 'text-rose-500'; 
                    break;
            }

            statusEl.className = `text-xs font-bold uppercase tracking-widest ${statusColor}`;
            statusEl.textContent = `${statusText} | user: 4xk5`;

            if (discord_user && discord_user.avatar) {
                const avatarUrl = `https://cdn.discordapp.com/avatars/${discord_user.id}/${discord_user.avatar}.png?size=128`;
                pfpContainer.innerHTML = `<img id="pfp-img" src="${avatarUrl}" alt="@ry's Discord PFP" class="w-full h-full object-cover rounded-full" onerror="this.onerror=null;this.src='https://placehold.co/128x128/fdf2f8/db2777?text=Err';">`;
            }

            const gamingActivity = activities.find(a => a.type === 0);
            const listeningActivity = activities.find(a => a.type === 2);
                
            activityEl.innerHTML = '';
                
            if (gamingActivity) {
                activityEl.classList.remove('hidden');
                activityEl.innerHTML = `<span class="font-bold text-gray-700">playing:</span> ${gamingActivity.name}`;
            } else if (listeningActivity) {
                activityEl.classList.remove('hidden');
                activityEl.innerHTML = `<span class="font-bold text-gray-700">listening to:</span> ${listeningActivity.details || listeningActivity.name}`;
            } else {
                activityEl.classList.add('hidden');
            }
        }

        async function fetchLanyardData() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
                const data = await response.json();
                updateDiscordPresence(data);
            } catch (error) {
                console.error('Lanyard fetch error:', error);
            }
        }

        function initializeLanyard() {
            fetchLanyardData();
            setInterval(fetchLanyardData, 10000);
        }

        // --- Discord Server API ---
        async function fetchDiscordServerData() {
            const serverNameEl = document.getElementById('server-name');
            const onlineMembersEl = document.getElementById('online-members');
            const totalMembersEl = document.getElementById('total-members');
            const serverIconEl = document.getElementById('server-icon');
            const serverLinkEl = document.getElementById('discord-server-link');
                
            const apiUrl = `https://discord.com/api/v8/invites/${DISCORD_INVITE_CODE}?with_counts=true`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Failed to fetch Discord server invite data.');

                const data = await response.json();
                const guild = data.guild;

                serverNameEl.textContent = guild.name || 'discord server';
                onlineMembersEl.textContent = (data.approximate_presence_count || 0).toLocaleString();
                totalMembersEl.textContent = (data.approximate_member_count || 0).toLocaleString();

                if (guild.icon) {
                    const iconUrl = `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=80`;
                    serverIconEl.src = iconUrl;
                    serverIconEl.onerror = () => serverIconEl.src = "https://placehold.co/40x40/FFB6C1/ffffff?text=DC";
                }
                    
                serverLinkEl.href = `https://discord.gg/${DISCORD_INVITE_CODE}`;

            } catch (error) {
                console.error("Error fetching Discord invite data:", error);
                serverNameEl.textContent = 'server unavailable';
                serverLinkEl.href = '#';
            }
        }

        // --- Roblox API ---
        async function fetchRobloxData() {
            const usernameEl = document.getElementById('roblox-username');
            const linkEl = document.getElementById('roblox-profile-link');
            const avatarEl = document.getElementById('roblox-avatar');
                
            linkEl.href = `https://www.roblox.com/users/${ROBLOX_USER_ID}/profile`;

            // MANDATORY: Hardcode the username as requested
            usernameEl.textContent = 'ChickenFingers'; 

            try {
                const avatarResponse = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${ROBLOX_USER_ID}&size=420x420&format=Png&isCircular=false`);
                if (avatarResponse.ok) {
                    const avatarData = await avatarResponse.json();
                    if (avatarData.data && avatarData.data.length > 0 && avatarData.data[0].imageUrl) {
                        avatarEl.src = avatarData.data[0].imageUrl;
                        avatarEl.onerror = () => avatarEl.src = "https://placehold.co/40x40/FFB6C1/ffffff?text=Err";
                    }
                }
            } catch (error) {
                console.error('Roblox fetch error:', error);
            }
        }

        // --- Rain Effect ---
        function initializeRainEffect() {
            const container = document.getElementById('rain-container');
            const density = 60; // Slightly less dense for bright theme

            for (let i = 0; i < density; i++) {
                const drop = document.createElement('div');
                drop.classList.add('rain-drop');

                const x = Math.random() * 100 + 'vw';
                const y = Math.random() * 100 + 'vh';
                const duration = Math.random() * 0.8 + 0.4 + 's';
                const delay = Math.random() * 5 + 's';
                const size = Math.random() * 2 + 1;

                drop.style.left = x;
                drop.style.top = y;
                drop.style.width = size + 'px';
                drop.style.animationDuration = duration;
                drop.style.animationDelay = delay;

                container.appendChild(drop);
            }
        }

        // --- Custom Cursor Glow Effect ---
        const particleContainer = document.getElementById('cursor-dot');
        particleContainer.style.width = '0';
        particleContainer.style.height = '0';
        particleContainer.style.opacity = '1';

        let lastMoveTime = 0;
        const EMIT_INTERVAL = 120; 

        function createHeartParticle(x, y) {
            const heart = document.createElement('span');
            heart.textContent = '💖';
            heart.classList.add('heart-particle');
                
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
                
            const driftX = Math.floor(Math.random() * 80) - 40; 
            const driftY = Math.floor(Math.random() * 80) - 40; 
                
            heart.style.setProperty('--drift-x', `${driftX}px`);
            heart.style.setProperty('--drift-y', `${driftY}px`);
                
            particleContainer.appendChild(heart);
                
            setTimeout(() => { heart.remove(); }, 1200); 
        }

        document.addEventListener('mousemove', (e) => {
            const currentTime = Date.now();
            if (currentTime - lastMoveTime < EMIT_INTERVAL) return;
            lastMoveTime = currentTime;
            createHeartParticle(e.clientX, e.clientY);
        });

        // --- Parallax Tilt Effect ---
        const tiltElement = document.getElementById('main-content');
        const MAX_TILT = 3; 

        document.addEventListener('mousemove', (e) => {
            if (tiltElement.classList.contains('hidden')) return;

            const width = window.innerWidth;
            const height = window.innerHeight;

            const centerX = width / 2;
            const centerY = height / 2;

            const mouseX = e.clientX - centerX;
            const mouseY = e.clientY - centerY;

            const percentX = (mouseX / centerX) * 100;
            const percentY = (mouseY / centerY) * 100;

            const rotateX = -(percentY / 100) * MAX_TILT; 
            const rotateY = (percentX / 100) * MAX_TILT;

            tiltElement.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            tiltElement.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
        });

        // --- Splash Screen Init ---
        document.getElementById('splash-screen').addEventListener('click', async function() {
            const splash = this;
            const content = document.getElementById('main-content');
            const video = document.getElementById('intro-video-blurred'); 

            video.play().catch(e => console.warn("Video autoplay failed:", e));

            initializeLanyard();    
            fetchDiscordServerData();   
            fetchRobloxData();  
                
            if (window.initializeAuth) {
                await window.initializeAuth();
            }
                
            initializeRainEffect();
            typeWriterLoop();

            splash.style.opacity = '0';

            setTimeout(() => {
                splash.classList.add('hidden');
                splash.remove();    
                content.classList.remove('hidden');
                setTimeout(() => {
                    content.style.opacity = '1';
                }, 50);
            }, 1000); 
        });
    </script>
</body>
