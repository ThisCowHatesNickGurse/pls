<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCAPTCHA Verification</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .captcha-box {
            background: #fff;
            border: 1px solid #d3d3d3;
            box-shadow: 0 0 4px 1px rgba(0,0,0,0.08);
            border-radius: 3px;
            width: 304px;
            height: 78px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: box-shadow 0.2s;
        }

        .captcha-box:hover {
            box-shadow: 0 0 6px 1px rgba(0,0,0,0.12);
        }

        .spinner-container {
            width: 28px;
            height: 28px;
            position: relative;
            margin-right: 12px;
        }

        .checkbox-rect {
            width: 28px;
            height: 28px;
            border: 2px solid #c1c1c1;
            background-color: #fff;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #jumpscare-container:fullscreen {
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function App() {
            const [isTriggered, setIsTriggered] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const containerRef = useRef(null);
            const videoRef = useRef(null);

            const handleVerifyClick = async () => {
                if (isTriggered || isLoading) return;

                setIsLoading(true);

                // Short delay to make the click feel "real" before the scare
                setTimeout(async () => {
                    try {
                        // Attempt to go fullscreen
                        if (containerRef.current.requestFullscreen) {
                            await containerRef.current.requestFullscreen();
                        } else if (containerRef.current.webkitRequestFullscreen) {
                            await containerRef.current.webkitRequestFullscreen();
                        } else if (containerRef.current.msRequestFullscreen) {
                            await containerRef.current.msRequestFullscreen();
                        }
                        
                        setIsTriggered(true);
                        
                        // Play the video
                        if (videoRef.current) {
                            videoRef.current.play().catch(e => {
                                console.error("Playback failed:", e);
                                // If autoplay/unmuted fails, we might need a backup 
                                // but since this is inside a click event, it should work.
                            });
                        }
                    } catch (err) {
                        console.error("Fullscreen/Play error:", err);
                        // Fallback: still show video even if fullscreen fails
                        setIsTriggered(true);
                        videoRef.current?.play();
                    }
                }, 400);
            };

            const handleVideoEnd = () => {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                }
                setIsTriggered(false);
                setIsLoading(false);
            };

            return (
                <div ref={containerRef} className="w-full h-full flex items-center justify-center bg-gray-100">
                    
                    {/* The Jumpscare Video Overlay */}
                    <div className={`absolute inset-0 z-50 bg-black ${isTriggered ? 'flex' : 'hidden'}`}>
                        <video 
                            ref={videoRef}
                            src="https://files.catbox.moe/v2usf3.mp4"
                            onEnded={handleVideoEnd}
                            onClick={(e) => e.stopPropagation()} // Prevent accidental exit
                        />
                    </div>

                    {/* The "Bait" UI */}
                    <div className="flex flex-col items-center">
                        <div className="mb-8 text-center">
                            <h2 className="text-xl text-gray-600 mb-1">One more step...</h2>
                            <p className="text-sm text-gray-400">Please verify you are a human to access the resource.</p>
                        </div>

                        <div className="captcha-box" onClick={handleVerifyClick}>
                            <div className="spinner-container">
                                {isLoading ? (
                                    <div className="spinner"></div>
                                ) : (
                                    <div className="checkbox-rect"></div>
                                )}
                            </div>
                            <div className="text-[14px] text-[#202124] font-normal flex-grow">
                                I'm not a robot
                            </div>
                            <div className="flex flex-col items-center justify-center opacity-70 ml-4">
                                <img 
                                    src="https://www.gstatic.com/recaptcha/api2/logo_48.png" 
                                    className="w-8 h-8" 
                                    alt="reCAPTCHA" 
                                />
                                <span className="text-[10px] text-gray-500 mt-1">reCAPTCHA</span>
                                <span className="text-[8px] text-gray-400">Privacy - Terms</span>
                            </div>
                        </div>
                        
                        <div className="mt-12 opacity-30 text-xs text-gray-500 max-w-xs text-center">
                            Verification is required due to high traffic volumes from your current IP address range.
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
