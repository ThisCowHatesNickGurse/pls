<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #f9f9f9;
            margin: 0;
            overflow: hidden;
        }

        @keyframes pulse-intense {
            0%, 100% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }
        
        .animate-pulse-scare {
            animation: pulse-intense 0.1s infinite;
        }

        /* Custom spinner for better compatibility */
        .spinner-ring {
            border-width: 3px;
            border-style: solid;
            border-color: #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 9999px;
            width: 1.5rem;
            height: 1.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [ip, setIp] = useState('0.0.0.0');
            const [rayId, setRayId] = useState('');
            const [isTriggered, setIsTriggered] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const containerRef = useRef(null);
            const videoRef = useRef(null);

            useEffect(() => {
                const fetchIp = async () => {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 5000);
                        
                        const response = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
                        clearTimeout(timeoutId);
                        
                        if (response.ok) {
                            const data = await response.json();
                            setIp(data.ip);
                        } else {
                            throw new Error('IP fetch failed');
                        }
                    } catch (error) {
                        setIp('192.168.1.' + Math.floor(Math.random() * 255)); 
                    }
                };
                
                const generateRayId = () => {
                    const chars = '0123456789abcdef';
                    let result = '';
                    for (let i = 0; i < 16; i++) {
                        result += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    return result;
                };

                fetchIp();
                setRayId(generateRayId());
            }, []);

            useEffect(() => {
                const handleFullscreenChange = () => {
                    const isFs = document.fullscreenElement || 
                                 document.webkitFullscreenElement || 
                                 document.mozFullScreenElement || 
                                 document.msFullscreenElement;

                    if (!isFs && isTriggered) {
                        const timer = setTimeout(() => {
                            if (isTriggered && containerRef.current) {
                                const requestFs = containerRef.current.requestFullscreen || 
                                                  containerRef.current.webkitRequestFullscreen || 
                                                  containerRef.current.mozRequestFullScreen || 
                                                  containerRef.current.msRequestFullscreen;
                                
                                if (requestFs) {
                                    requestFs.call(containerRef.current).catch(() => {});
                                }
                            }
                        }, 1000);
                        return () => clearTimeout(timer);
                    }
                };

                document.addEventListener('fullscreenchange', handleFullscreenChange);
                document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
                document.addEventListener('mozfullscreenchange', handleFullscreenChange);
                document.addEventListener('MSFullscreenChange', handleFullscreenChange);
                
                return () => {
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                    document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
                    document.removeEventListener('mozfullscreenchange', handleFullscreenChange);
                    document.removeEventListener('MSFullscreenChange', handleFullscreenChange);
                };
            }, [isTriggered]);

            const handleVerifyClick = async () => {
                if (isTriggered || isLoading) return;

                setIsLoading(true);

                // Slight delay to make the "loading" feel real before the scare
                setTimeout(async () => {
                    try {
                        const requestFs = containerRef.current?.requestFullscreen || 
                                          containerRef.current?.webkitRequestFullscreen || 
                                          containerRef.current?.mozRequestFullScreen || 
                                          containerRef.current?.msRequestFullscreen;
                        
                        if (requestFs) {
                            await requestFs.call(containerRef.current);
                        }

                        setIsTriggered(true);

                        if (videoRef.current) {
                            videoRef.current.currentTime = 0;
                            // Explicit play call ensures it starts regardless of autoplay blocks
                            videoRef.current.play().catch((e) => console.error("Playback block:", e));
                        }
                    } catch (err) {
                        setIsTriggered(true);
                        videoRef.current?.play();
                    }
                }, 600);
            };

            const handleVideoEnd = () => {
                setIsTriggered(false);
                setIsLoading(false);
                
                const exitFs = document.exitFullscreen || 
                               document.webkitExitFullscreen || 
                               document.mozCancelFullScreen || 
                               document.msExitFullscreen;
                               
                if (exitFs && (document.fullscreenElement || document.webkitFullscreenElement)) {
                    exitFs.call(document).catch(() => {});
                }
            };

            return (
                <div 
                    ref={containerRef} 
                    className="relative flex flex-col items-center justify-center w-full h-screen bg-[#f9f9f9] overflow-hidden select-none font-sans"
                >
                    {/* JUMPSCARE OVERLAY 
                        Always present in DOM to allow preloading and instant autoPlay
                    */}
                    <div className={`absolute inset-0 z-50 flex items-center justify-center bg-black transition-opacity duration-75 ${isTriggered ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                        <video
                            ref={videoRef}
                            src="https://files.catbox.moe/v2usf3.mp4"
                            className="w-full h-full object-cover"
                            onEnded={handleVideoEnd}
                            playsInline
                            autoPlay
                            preload="auto"
                        />
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-red-600 font-mono text-4xl md:text-8xl font-bold tracking-widest opacity-90 animate-pulse-scare pointer-events-none drop-shadow-[0_0_20px_rgba(220,38,38,1)] text-center">
                            {ip}
                        </div>
                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 text-red-700 font-mono text-xl uppercase tracking-widest opacity-60 whitespace-nowrap pointer-events-none">
                            Location Logged. System Compromised.
                        </div>
                    </div>

                    <div className={`flex flex-col items-center transition-opacity duration-500 ${isTriggered ? 'opacity-0' : 'opacity-100'}`}>
                        <div className="mb-10 text-center">
                            <h2 className="text-2xl font-medium text-gray-800 mb-2">One more step...</h2>
                            <p className="text-sm text-gray-500">Please verify you are a human to access the resource.</p>
                        </div>

                        <div 
                            onClick={handleVerifyClick}
                            className="flex items-center w-[304px] h-[78px] px-3 bg-white border border-[#d3d3d3] rounded-[3px] shadow-sm hover:shadow-md transition-shadow cursor-pointer group"
                        >
                            <div className="relative flex items-center justify-center w-7 h-7 mr-3">
                                {isLoading ? (
                                    <div className="spinner-ring"></div>
                                ) : (
                                    <div className="w-6 h-6 border-2 border-[#c1c1c1] bg-white rounded-[2px] group-hover:border-[#b1b1b1] transition-colors"></div>
                                )}
                            </div>
                            
                            <div className="flex-grow text-[14px] text-[#202124] font-normal">
                                I'm not a robot
                            </div>

                            <div className="flex flex-col items-center justify-center ml-4">
                                <img 
                                    src="https://www.gstatic.com/recaptcha/api2/logo_48.png" 
                                    className="w-8 h-8 opacity-90" 
                                    alt="reCAPTCHA logo" 
                                />
                                <span className="text-[10px] text-gray-400 mt-1 uppercase text-[8px] tracking-tighter font-bold">reCAPTCHA</span>
                                <div className="flex space-x-1 text-[8px] text-gray-400 leading-none">
                                    <span>Privacy</span>
                                    <span>-</span>
                                    <span>Terms</span>
                                </div>
                            </div>
                        </div>

                        <div className="mt-20 text-center max-w-xs space-y-1.5 opacity-60">
                            <p className="text-[11px] text-gray-500 font-medium">
                                Ray ID: <span className="font-mono text-gray-700">{rayId}</span>
                            </p>
                            <p className="text-[10px] text-gray-400 italic">
                                Performance & security by Cloudflare-Edge
                            </p>
                            <div className="h-[1px] w-12 bg-gray-200 mx-auto my-2"></div>
                            <p className="text-[9px] text-gray-400 leading-relaxed uppercase tracking-wider">
                                High traffic detected from your network segment. Manual verification is mandatory for continued access.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
