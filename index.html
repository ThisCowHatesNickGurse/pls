<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Full-screen tap overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Dimmed background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        /* The actual button box */
        .play-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none; /* Let clicks pass through to the overlay container */
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="play-btn">Tap to Play</div>
    </div>

    <video id="myVideo" controls autoplay muted playsinline>
        <source src="https://cdn.discordapp.com/attachments/1502109845820538910/1512993500457603092/OY_qk1Mf4sbvGqGE.mp4?ex=6a261c80&is=6a24cb00&hm=c467bb014e67c0103c8b4cead4e92825e0fcd712f50dde528893e49332995fc5&" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('click', () => {
            video.muted = false; // Unmute the audio
            video.currentTime = 0; // Optional: Restart the video from the beginning when tapped
            video.play(); // Ensure it plays
            
            // Hide the overlay
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 300);
        });
    </script>

</body>
</html>
